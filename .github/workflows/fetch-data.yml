name: Fetch Inventory Data

on:
  schedule:
    - cron: '0 8,14,20 * * *'  # 8am, 2pm, 8pm UTC (adjust to your timezone)
  workflow_dispatch:             # Manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch sheets
        run: python fetch_data.py

      - name: Commit data
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || git commit -m "Auto-update inventory data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
